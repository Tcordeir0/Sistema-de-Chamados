{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto">
        <div class="bg-gray-800 rounded-lg shadow-lg p-6">
            <div class="flex items-center mb-6">
                <i class="fas fa-plus-circle text-blue-500 text-2xl mr-3"></i>
                <h1 class="text-2xl font-bold text-white">Novo Chamado</h1>
            </div>
            
            <form id="formChamado" method="POST" class="space-y-6">
                <div>
                    <label for="titulo" class="block text-sm font-medium text-gray-300">Título</label>
                    <input type="text" id="titulo" name="titulo" required
                           class="mt-1 block w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md text-white 
                                  shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                                  placeholder-gray-400"
                           placeholder="Digite um título para o chamado">
                </div>
                
                <div>
                    <label for="descricao" class="block text-sm font-medium text-gray-300">Descrição</label>
                    <textarea id="descricao" name="descricao" rows="6" required
                            class="mt-1 block w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md text-white 
                                   shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                                   placeholder-gray-400 resize-none"
                            placeholder="Descreva detalhadamente o seu chamado"></textarea>
                </div>

                <div class="flex justify-end space-x-3">
                    <a href="{{ url_for('meus_chamados') }}" 
                       class="px-4 py-2 text-gray-300 hover:text-white transition-colors">
                        Cancelar
                    </a>
                    <button type="submit" 
                            class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 
                                   transition-colors flex items-center">
                        <i class="fas fa-paper-plane mr-2"></i>
                        Enviar Chamado
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.getElementById('formChamado').addEventListener('submit', function(e) {
    const titulo = document.getElementById('titulo').value.trim();
    const descricao = document.getElementById('descricao').value.trim();
    
    if (!titulo || !descricao) {
        e.preventDefault();
        toastSystem.create('Por favor, preencha todos os campos.', 'error');
        return;
    }
});
</script>
{% endblock %}
